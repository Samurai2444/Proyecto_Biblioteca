name: biblioteca

services:
  frontend:
    build:
      context: ../frontend
      dockerfile: DockerfileReact_SRS
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true
    depends_on:
      mysql:
        condition: service_healthy
      backend:
        condition: service_started
    networks:
      - recu_srs

  backend:
    build:
      context: ../backend
      dockerfile: DockerfileSymfony_SRS
    volumes:
      - ../backend:/app
    environment:
      DATABASE_URL: "mysql://biblioteca:biblioteca_clave@mysql:3306/biblioteca_srs?serverVersion=8.0.32&charset=utf8mb4"
    depends_on:
      mysql:
        condition: service_healthy
    command:
      [
        "sh",
        "-c",
        "composer install --no-interaction && php -S 0.0.0.0:8000 -t public public/router.php",
      ]
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://127.0.0.1:8000/health/db >/dev/null || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 120s
    ports:
      - "8000:8000"
    networks:
      - recu_srs

  mysql:
    image: mysql:8.0
    env_file:
      - ../.bdSRS
    ports:
      - "3306:3306"
    volumes:
      - ./mysql/bd.sql:/docker-entrypoint-initdb.d/init.sql
      - copiaBD_srs:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "--silent"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    networks:
      - recu_srs

  gestor_srs:
    image: phpmyadmin/phpmyadmin
    env_file:
      - ../.bdSRS
      - ../.adminSRS
    ports:
      - "8080:80"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - recu_srs

  srs_proxyinverso:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
    networks:
      - recu_srs

networks:
  recu_srs:
    driver: bridge

volumes:
  copiaBD_srs:
